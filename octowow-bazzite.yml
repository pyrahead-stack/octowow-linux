# OctoWoW — Lutris install script (community package)
# Works on Bazzite (native OR Flatpak Lutris) and Steam Deck.
#
# How to use:
#   Open Lutris -> "+" -> "Install from a local install script" -> select this file.
#   For the install location, point to the ALREADY DOWNLOADED OctoWoW folder
#   (e.g. ~/Spiele/OctoWoW) that contains WoW.exe / VanillaFixes.exe.
#
# Prerequisite: client download done (Launcher OR OctoUpdater, Step 1).
#
# ⚠️⚠️ MOST IMPORTANT LESSON (Steam Deck debugging 2026-06-19):
#   The Wine prefix must NEVER live inside the game folder!
#   On startup, WoW (via VanillaHelpers.dll) does a recursive directory walk
#   of the game folder. If a Wine prefix is in there (deep folder trees, possibly
#   symlink loops like "pfx -> ."), the walk runs into a stack overflow
#   -> ERROR #132 (0x85100084, ACCESS_VIOLATION) even BEFORE the first window.
#   Therefore: put the prefix as a SIBLING folder next to the game folder ($GAMEDIR/../...).
#   The game folder then contains ONLY game files (Data/ Interface/ WTF/ + exe/dll).
#
# Other pitfalls:
#   - Launch via VanillaFixes.exe (chainloader, provides the multicore fix), NOT via
#     the Launcher "PLAY" button (its DLL injection fails under Wine/Proton -> #132).
#   - DXVK active only ONCE. The modern OctoWoW client already ships a d3d9.dll
#     (DXVK) in the game folder -> here dxvk:false + override d3d9=n,b (loads the
#     existing d3d9.dll). If there is NO d3d9.dll in the folder: instead set dxvk:true
#     and remove the d3d9 override.
#   - Leave the Launcher mod "UnitXP" OFF (re-injects UnitXP_SP3.dll -> crash on Deck).
#   - realmlist = 185.165.170.6 (octowow.st). The old .33 is wrong/outdated.

name: OctoWoW
game_slug: octowow
version: Community
slug: octowow-bazzite-community
runner: wine

script:
  game:
    exe: $GAMEDIR/VanillaFixes.exe     # if not present: $GAMEDIR/WoW.exe
    prefix: $GAMEDIR/../octowow-prefix # NEXT TO the game folder, NOT inside it!
    arch: win32
    working_dir: $GAMEDIR

  wine:
    dxvk: false        # d3d9.dll (DXVK) is already in the game folder; otherwise set to true
    esync: true
    fsync: true

  system:
    env:
      WINEDLLOVERRIDES: mscoree=;mshtml=;d3d9=n,b
      DXVK_HUD: fps
      mesa_glthread: 'true'

  installer:
    - task:
        name: create_prefix
        arch: win32
        prefix: $GAMEDIR/../octowow-prefix
    - write_file:
        file: $GAMEDIR/realmlist.wtf
        content: |
          set realmlist 185.165.170.6
          set patchlist 185.165.170.6
